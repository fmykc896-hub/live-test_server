version: "3.9"

services:

  nginx:
    image: nginx:1.25
    container_name: live-nginx
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./app:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - app-network  
    restart: always

  app:
    image: php:8.4-fpm
    container_name: live-php
    volumes:
      - ./app:/var/www/html
    networks:
      - app-network
    restart: always

    mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network

volumes:
  mysql-data:

networks:
  app-network: